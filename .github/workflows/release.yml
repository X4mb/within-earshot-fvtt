# Tag v* → build module.zip and attach to the GitHub Release (matches manifest "download").
name: Release package zip
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run release-pack

      - uses: softprops/action-gh-release@v2
        with:
          files: module.zip
          generate_release_notes: true
