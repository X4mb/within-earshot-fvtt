# Tag v* → build module.zip (Foundry layout) and upload module.zip + withinearshot.zip (alias).
# Manifest "download" uses …/releases/.../download/module.zip per common Foundry / GitHub practice.
name: Release package zip
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run release-pack
      - run: cp module.zip withinearshot.zip

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            module.zip
            withinearshot.zip
          generate_release_notes: true
